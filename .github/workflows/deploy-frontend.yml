# Auto-deploy the frontend to S3 + CloudFront on every push to main.
# Auth is keyless via GitHub OIDC (assumes an IAM role — no AWS keys stored).

name: Deploy Frontend

on:
  push:
    branches: [main, staging]   # main → production, staging → staging
  workflow_dispatch: {}         # lets you trigger manually from the Actions tab

concurrency:                    # never let two deploys of the SAME branch race
  group: deploy-frontend-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  id-token: write               # required for OIDC
  contents: read

env:
  AWS_REGION: ap-south-1

jobs:
  # ── Gate: lint + unit/UI tests must pass before anything deploys ──────────
  # The `deploy` job below declares `needs: test`, so if a single test fails
  # this job fails and the deployment never starts.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # The lockfile is generated with npm 11 (dev machines). node 20 ships
      # npm 10, whose stricter reader rejects npm 11's nested-dependency
      # lockfile format ("Missing esbuild@... from lock file"). Pin CI to
      # npm 11 so `npm ci` reads the lockfile exactly as it was written.
      # npm 11 also reads older lockfile formats, so this stays correct no
      # matter which npm a teammate uses.
      - name: Pin npm to match the lockfile
        run: npm install -g npm@11

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test:run

  deploy:
    needs: test                 # ← deploy ONLY runs if the `test` job succeeded
    runs-on: ubuntu-latest
    # Bind the job to a GitHub Environment so environment-scoped Variables
    # resolve per branch: main → 'production', staging → 'staging'. This lets
    # VITE_COOKIE_AUTH (below) be true on staging while staying unset/false on
    # production until cookie auth is explicitly enabled there.
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # The lockfile is generated with npm 11 (dev machines). node 20 ships
      # npm 10, whose stricter reader rejects npm 11's nested-dependency
      # lockfile format ("Missing esbuild@... from lock file"). Pin CI to
      # npm 11 so `npm ci` reads the lockfile exactly as it was written.
      # npm 11 also reads older lockfile formats, so this stays correct no
      # matter which npm a teammate uses.
      - name: Pin npm to match the lockfile
        run: npm install -g npm@11

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_APP_MODE: ${{ vars.VITE_APP_MODE }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          # Cookie-based auth flag (httpOnly session cookie + Google code-exchange).
          # Resolved from the environment-scoped Variable above: set it to "true"
          # in the 'staging' GitHub Environment to enable; leave unset/false in
          # 'production'. Missing → "false" (fail closed; legacy token flow).
          VITE_COOKIE_AUTH: ${{ vars.VITE_COOKIE_AUTH }}
          # Firebase web-push config — baked into the bundle at build time. These
          # are public (shipped to the browser), so repo Variables are fine. Without
          # them isConfigured=false and FCM is silently disabled (no token, no API call).
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ vars.VITE_FIREBASE_VAPID_KEY }}

      # Pick the target bucket + distribution based on the branch that triggered
      # this run. main → production, anything else (staging) → staging.
      - name: Resolve environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "bucket=prajaakeeya-frontend"          >> "$GITHUB_OUTPUT"
            echo "dist=E4MRGE3YYYD1J"                   >> "$GITHUB_OUTPUT"
          else
            echo "bucket=prajaakeeya-frontend-staging"  >> "$GITHUB_OUTPUT"
            echo "dist=E322GXCJRA1CAW"                  >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials (OIDC, keyless)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Hashed assets → cache hard for a year (filenames change every build).
      - name: Sync immutable assets
        run: |
          aws s3 sync dist/ s3://${{ steps.env.outputs.bucket }}/ \
            --delete \
            --exclude "index.html" \
            --exclude "sw.js" \
            --exclude "registerSW.js" \
            --exclude "firebase-messaging-sw.js" \
            --exclude "manifest.webmanifest" \
            --cache-control "public,max-age=31536000,immutable"

      # Entry + service-worker files → never cache, so releases go live instantly.
      - name: Sync no-cache entry + service-worker files
        run: |
          B="${{ steps.env.outputs.bucket }}"
          aws s3 cp dist/index.html s3://$B/index.html \
            --cache-control "no-cache,no-store,must-revalidate" --content-type "text/html"
          [ -f dist/sw.js ] && aws s3 cp dist/sw.js s3://$B/sw.js \
            --cache-control "no-cache,no-store,must-revalidate" --content-type "application/javascript" || true
          [ -f dist/registerSW.js ] && aws s3 cp dist/registerSW.js s3://$B/registerSW.js \
            --cache-control "no-cache,no-store,must-revalidate" --content-type "application/javascript" || true
          [ -f dist/firebase-messaging-sw.js ] && aws s3 cp dist/firebase-messaging-sw.js s3://$B/firebase-messaging-sw.js \
            --cache-control "no-cache,no-store,must-revalidate" --content-type "application/javascript" || true
          [ -f dist/manifest.webmanifest ] && aws s3 cp dist/manifest.webmanifest s3://$B/manifest.webmanifest \
            --cache-control "no-cache" --content-type "application/manifest+json" || true

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.env.outputs.dist }} \
            --paths "/" "/index.html" "/sw.js" "/registerSW.js" "/firebase-messaging-sw.js" "/manifest.webmanifest"
