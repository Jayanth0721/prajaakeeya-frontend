customHeaders:
  - pattern: '/sw.js'
    headers:
      - key: Cache-Control
        value: 'no-cache, no-store, must-revalidate'
      - key: Pragma
        value: 'no-cache'
      - key: Expires
        value: '0'

  - pattern: '/index.html'
    headers:
      - key: Cache-Control
        value: 'no-cache, no-store, must-revalidate'

  - pattern: '/manifest.webmanifest'
    headers:
      - key: Cache-Control
        value: 'no-cache, no-store, must-revalidate'

  - pattern: '/registerSW.js'
    headers:
      - key: Cache-Control
        value: 'no-cache, no-store, must-revalidate'

  - pattern: '/assets/*'
    headers:
      - key: Cache-Control
        value: 'public, max-age=31536000, immutable'
